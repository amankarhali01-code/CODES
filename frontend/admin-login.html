<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Amandeep Singh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-blur bg-blur-1"></div>
  <div class="bg-blur bg-blur-2"></div>

  <main class="container auth-wrap">
    <section class="glass panel auth-card reveal">
      <h1>Admin Login</h1>
      <form id="adminLoginForm" class="contact-form">
        <div class="form-group">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" required />
        </div>
        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" required />
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
        <a href="index.html" class="btn btn-outline">Back to Website</a>
        <p id="adminLoginStatus" class="status-text" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
